name: CI - Build & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual execution

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            jq \
            stress-ng \
            cppcheck \
            build-essential \
            zlib1g-dev

      - name: Make scripts executable
        run: |
          chmod +x makeAll.sh
          chmod +x make.sh

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance \
            --inconclusive \
            --error-exitcode=1 \
            --std=c11 \
            --quiet \
            --inline-suppr \
            --xml \
            --xml-version=2 \
            -i code/build \
            code/ 2> cppcheck-report.xml

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.xml

      - name: Run full build + tests
        run: |
          ./makeAll.sh -includeUnitTests -includeIntegrationTests
