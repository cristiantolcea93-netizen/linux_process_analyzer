stages:
  - build

############################################
# Native x86 build + tests
############################################

build-and-test:
  stage: build
  image: ubuntu:22.04

  before_script:
    - apt-get update
    - apt-get install -y cmake ninja-build jq stress-ng build-essential zlib1g-dev

  script:
    - chmod +x makeAll.sh
    - chmod +x make.sh
    - ./makeAll.sh -includeUnitTests -includeIntegrationTests

  artifacts:
    paths:
      - build/

############################################
# ARM64 build + tests (manual only)
############################################

build-and-test-arm:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind

  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""

  when: manual   # 👈 manual trigger only

  script:
    # Enable multi-arch support
    - docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

    # Run ARM container and build inside
    - |
      docker run --rm \
        --platform linux/arm64 \
        -v $CI_PROJECT_DIR:/workspace \
        -w /workspace \
        arm64v8/ubuntu:22.04 \
        bash -c "
          apt-get update &&
          apt-get install -y \
            cmake \
            ninja-build \
            jq \
            stress-ng \
            build-essential \
            zlib1g-dev &&

          chmod +x makeAll.sh &&
          chmod +x make.sh &&

          ./makeAll.sh -includeUnitTests -includeIntegrationTests
        "

  artifacts:
    name: process_analyzer-arm64
    paths:
      - build/bin/process_analyzer

